<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traffic Sim — IDM</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #111;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: monospace;
        color: #ccc;
        overflow: hidden;
      }
      #app {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      canvas {
        border: 1px solid #333;
        border-radius: 4px;
      }
      #stats {
        font-size: 12px;
        color: #888;
        min-height: 36px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="canvas"></canvas>
      <div id="stats">Connecting to simulation…</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
    <script type="module" src="src/main.js"></script>
  </body>
</html>

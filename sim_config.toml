# Runtime config for traffic_sim
# Edit values and rerun the app (no rebuild needed).

[simulation]
fixed_dt   = 0.016    # Krok symulacji w sekundach
max_frames = 20000    # Liczba klatek po której aplikacja się zamknie

[intersection]
approach_radius = 0.5   # Odległość od punktu kolizji, od której pojazd zgłasza chęć wjazdu
clear_radius    = 0.2   # Odległość za punktem kolizji potrzebna do zwolnienia przejazdu

[spawn]
north_spawn_y = 4.0   # Startowa pozycja Y pojazdu jadącego z północy (w dół)
east_spawn_x  = 4.0   # Startowa pozycja X pojazdu jadącego ze wschodu (w lewo)

[vehicle]
max_speed = 1.0   # Maksymalna prędkość pojazdu [jednostki/s]

[idm]
a_max            = 1.0   # Maksymalne przyspieszenie [m/s²]
b_comf           = 1.5   # Komfortowe hamowanie — minimalny próg deceleracji [m/s²]
delta            = 4.0   # Wykładnik przyspieszenia (kształt krzywej IDM)
s0               = 0.3   # Minimalna luka w kolumnie przy postoju [jednostki]
t_headway        = 0.8   # Bezpieczny odstęp czasowy [s]
stop_line_offset = 0.2   # Odległość przed punktem kolizji, w której pojazd celuje zatrzymać się
